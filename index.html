<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <title>Suryqata Art</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css"> <!-- Main Styles -->
    <link rel="stylesheet" href="header.css"> <!-- Header Styling -->
    <link rel="stylesheet" href="responsivity.css"> <!-- Responsivity -->
    <script src="script.js"></script> <!-- Main JavaScript -->

    <body>
        <div class="header">
            <h1><a href="index.html">Suryqata</a></h1>
            <nav class="header-nav is-home">
                <a href="gallery.html">Store</a>
            </nav>
        </div>

        <section id="mission">
            <h2>MISSION</h2>
        </section>
        <section id="work">
            <div class="work-col-1">
                <img src="images/myWorkText.png" alt="My Work Text Image" class="my-work-text-image">
            </div>
            <div class="work-col-2">
                <div class="work-image-stack" onclick="window.location.href='gallery.html';">
                    <img src="images/artNotebookWhiteBG.png" alt="" class="work-image-bg" aria-hidden="true">
                    <img src="images/artNotebook.png" alt="Art Notebook" class="work-image">
                </div>
            </div>
        </section>
        <section id="contact">
            <h2>CONTACT</h2>
            <p>Contact details and links go here.</p>
            <img src="images/contact_button.png" alt="Contact Button" class="contact-image">
        </section>
    </body>
</html>
