<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <title>Suryqata Art</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css"> <!-- Main Styles -->
    <link rel="stylesheet" href="header.css"> <!-- Header Styling -->
    <link rel="stylesheet" href="responsivity.css"> <!-- Responsivity -->
    <script src="script.js"></script> <!-- Main JavaScript -->

    <body>
        <div class="header">
            <h1><a href="index.html"><img src="images/suryqataText.png" alt="Suryqata" class="header-logo-image"></a></h1>
            <nav class="header-nav is-home">
                <a href="gallery.html">Store</a>
            </nav>
        </div>

        <div class="global-pencil-layer" aria-hidden="true">
            <img src="images/pencil.png" alt="" class="global-pencil global-pencil-mission">
            <img src="images/triangle.png" alt="" class="global-pencil global-triangle">
            <img src="images/sheep.png" alt="" class="global-pencil global-sheep">
        </div>

        <section id="mission">
            <div class="mission-layout">
                <div class="mission-overlap">
                    <img src="images/suryqata _skeleton.png" alt="Suryqata Skeleton" class="mission-skeleton">
                </div>
                <div class="mission-col">
                    <img src="images/myMissionText.png" alt="My Mission" class="mission-text-img">
                    <p class="mission-paragraph">I am an Artist dedicated to connect people,
                         and making people feel seen through the thought provoking nature of my art.</p>
                </div>
            </div>
        </section>
        <section id="work">
            <div class="work-col-1">
                <img src="images/myWorkText.png" alt="My Work Text Image" class="my-work-text-image">
                <p class="work-subtitle">"Open the notebook <br> and checkout my Art."</p>
            </div>
            <div class="work-col-2">
                <div class="work-image-stack" onclick="window.location.href='gallery.html';">
                    <img src="images/artNotebookWhiteBG.png" alt="" class="work-image-bg" aria-hidden="true">
                    <img src="images/artNotebook.png" alt="Art Notebook" class="work-image">
                    <img src="images/rightArrow.png" alt="Right Arrow" class="work-arrow">
                </div>
            </div>
        </section>
        <section id="contact">
            <h2>CONTACT ME</h2>
            <div class="contact-stack">
                <a href="mailto:suryqtheprechtl@gmail.com?subject=Art%20Enquiry" class="contact-link" aria-label="Send email enquiry">
                    <img src="images/contact_button.png" alt="Contact Button" class="contact-image">
                </a>
                <img src="images/redArrowLeft.png" alt="" class="contact-arrow contact-arrow-left" aria-hidden="true">
                <img src="images/redArrowRight.png" alt="" class="contact-arrow contact-arrow-right" aria-hidden="true">
            </div>
        </section>
    </body>
</html>
